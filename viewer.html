<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js" async></script>
<script src="viewer.js" defer></script>

  <style>
    html, body { margin:0; width:100%; height:100%; background:transparent; overflow:hidden; }
#stage{
  position: absolute;
  left: 0;
  top: 0;
  width: var(--design-w, 1920px);
  height: var(--design-h, 1080px);
  transform-origin: 0 0;
  will-change: transform;
}


/* rozmiar kart */

.card{
  position: absolute;

  width: calc(var(--design-h, 1080px) * 0.130); /* ~120px at 1080p */
  max-width: 140px;
  aspect-ratio: 5.5 / 6.5;
  height: auto;

  transform: translate(-50%, -50%);
  border-radius: 14px;
  box-sizing: border-box;

  /* TO CI WRACA RAMKI + WYGLĄD */
  border: 2px solid rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.35);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;

  pointer-events: auto;
  cursor: pointer;
  user-select: none;

  
  border: 3px solid yellow !important;
}

#stageWrap{
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: grab;
  z-index: 9999;
  /* IMPORTANT: stageWrap should NOT be transformed */
  transform: none;
}


#stageWrap.dragging{ cursor: grabbing; }

#uiScale{
  position:fixed;
  left:12px;
  bottom:80px;
  z-index:999999;
  width:180px;
  opacity:0.85;
}

  </style>
</head>

<body>
  <div style="position:fixed;top:10px;left:10px;z-index:999999;background:#000;color:#fff;padding:8px">
    EXTENSION LOADED !!!
  </div>

  <div style="position:fixed;top:10px;left:10px;z-index:9999;background:#111;color:#fff;padding:8px;border-radius:6px;font-family:Arial">
    viewer.html działa (to jest test)
  </div>

  <div id="stageWrap">
    <div id="stage"></div>
  </div>

<input id="uiScale" type="range" min="0.5" max="1.5" step="0.01" value="1" />








<div id="status"></div>

<style>
  #status{
    position: fixed;
    left: 24px;
    bottom: 24px;
    z-index: 999999;
    padding: 10px 14px;
    border-radius: 10px;
    font: 700 18px Arial, sans-serif;
    color: #fff;
    background: rgba(0,0,0,0.55);
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }
</style>




</body>
</html>
